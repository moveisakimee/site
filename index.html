<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Montador Fácil PRO</title>

  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    header { background:#0d6efd; color:#fff; padding:20px; text-align:center; }
    .container { padding:20px; }
    .card { background:#fff; padding:20px; margin:10px 0; border-radius:10px; }
    input { width:100%; padding:10px; margin:5px 0; }
    button { background:#0d6efd; color:#fff; border:none; padding:10px; border-radius:5px; }
  </style>
</head>
<body>

<header>
  <h1>Montador Fácil PRO</h1>
</header>

<div class="container">

  <div class="card">
    <h2>Cadastro / Login</h2>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Senha">
    <button>Cadastrar</button>
  </div>

  <div class="card">
    <h2>Solicitar Serviço</h2>
    <input placeholder="Serviço">
    <button>Enviar</button>
  </div>

</div>

</body>
</html>
